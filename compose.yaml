services:
  server:
    build: .
    command: ["./bin/server", "4242", "300", "5"]
    ports:
      - "4242:4242"
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/127.0.0.1/4242'"]
      interval: 5s
      timeout: 2s
      retries: 5

  client:
    build: .
    command: ["./bin/client", "server", "4242"]
    depends_on:
      server:
        condition: service_healthy
    stdin_open: true
    tty: true
